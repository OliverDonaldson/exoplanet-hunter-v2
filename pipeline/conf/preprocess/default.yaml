# Light-curve preprocessing — Shallue & Vanderburg (2018) conventions.
name: default

cleaning:
  sigma_clip: 5.0          # Reject points more than this many sigma from the median.
  min_points: 1000         # Skip targets with fewer good points after cleaning.

flatten:
  window_length: 301       # Savitzky-Golay window in cadences. Should be >> transit duration.
  polyorder: 2

views:
  global_bins: 2001        # Spans the full phase [-0.5, 0.5].
  local_bins:  201         # Spans ±3 transit durations around phase 0.
  local_durations: 3.0
  bin_method: median
  normalise: median        # Subtract median, divide by depth (Shallue convention).

augmentation:
  enabled: true
  time_shift_frac: 0.005
  noise_std: 0.0005
  scale_range: 0.05
  mask_prob: 0.02
