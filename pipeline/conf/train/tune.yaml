# Optuna hyperparameter search.
# Run via Hydra multi-run mode:
#   python scripts/train_model.py -m train=tune
defaults:
  - default

name: tune

optuna:
  n_trials: 50
  timeout: 7200             # 2 hours
  direction: maximize
  metric: val_auc
  pruner:
    _target_: optuna.pruners.MedianPruner
    n_startup_trials: 5
    n_warmup_steps: 5

# Search space — overrides applied by the tuner.
#
# Keys are dotted paths from the config root. Training hyperparameters
# live under `train.*`; model hyperparameters live under `model.*`.
# Getting this prefix wrong makes the tuner silently no-op (OmegaConf
# with `force_add=True` will create an unused top-level key instead of
# mutating the real hyperparameter).
search_space:
  train.optimizer.learning_rate:
    type: loguniform
    low:  1.0e-5
    high: 1.0e-2
  train.batch_size:
    type: categorical
    choices: [32, 64, 128, 256]
  model.head.dropout:
    type: uniform
    low:  0.1
    high: 0.5
  train.loss.type:
    type: categorical
    choices: [binary_crossentropy, focal]
  train.loss.focal_gamma:
    type: uniform
    low:  1.0
    high: 4.0
  train.loss.focal_alpha:
    type: uniform
    low:  0.5
    high: 0.9
