name: default

batch_size: 32
epochs: 200
shuffle_buffer: 1024
prefetch: AUTOTUNE

# mixed_float16 on the GPU burst (2-3x on Tensor Cores). Off by default:
# neutral-at-best on CPU/Metal, and the output layer is already fp32-pinned.
mixed_precision: false

optimizer:
  _target_: tensorflow.keras.optimizers.Adam
  learning_rate: 3.2e-4    # Optuna re-tune 2026-07, trial 26 (was 5.0e-4)
  clipnorm: 1.0

loss:
  type: binary_crossentropy
  focal_gamma: 2.0
  focal_alpha: 0.75

# Compute from training set; null = uniform. Ignored when loss.type is
# "focal" — focal loss already rebalances via α, so applying sklearn
# class weights on top would double-count the minority class.
class_weight: auto

metrics:
  - accuracy
  - auc
  - precision
  - recall

callbacks:
  early_stopping:
    monitor: val_auc
    mode: max
    patience: 25
    restore_best_weights: true
  model_checkpoint:
    monitor: val_auc
    mode: max
    save_best_only: true
  reduce_lr:
    monitor: val_loss
    mode: min
    factor: 0.5
    patience: 8
    min_lr: 1.0e-6
