# Full-scale dataset: every labelled TESS target plus the balanced Kepler
# block. This is the feat/data-scaling expansion config. TESS is uncapped;
# the Kepler block is capped but selection is content-keyed (stable across
# refreshes), so the refresh trigger no longer sees sampling churn.
#
# The Kepler raw cache lives in-repo at data/raw_kepler (moved from V1 during
# the 2026-07-13 audit); KEPLER_RAW_DIR still overrides it if ever needed.
#
# Usage:
#   python pipeline/scripts/build_dataset.py data=full
name: full

# Effectively uncapped — build_label_catalog takes min(requested, available),
# so these consume the whole labelled TOI pool (~1,300 CP/KP + ~1,350 FP/FA).
n_confirmed: 1000000
n_false_pos: 1000000

# Kepler / KOI targets — same balanced block as V1's final report build.
n_confirmed_kepler: 1250
n_false_pos_kepler: 1250

sectors: null
author: SPOC
cadence: 120

seed: ${seed}

split:
  train: 0.7
  val:   0.15
  test:  0.15
