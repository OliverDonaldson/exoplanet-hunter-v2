# Full-scale dataset: every labelled TESS target plus the balanced Kepler
# block (content-keyed selection — stable across refreshes). Kepler raw
# cache: data/raw_kepler (override: KEPLER_RAW_DIR).
#
# Usage:
#   python pipeline/scripts/build_dataset.py data=full
name: full

# Effectively uncapped — build_label_catalog takes min(requested, available),
# so these consume the whole labelled TOI pool (~1,300 CP/KP + ~1,350 FP/FA).
n_confirmed: 1000000
n_false_pos: 1000000

# Kepler / KOI targets — same balanced block as V1's final report build.
n_confirmed_kepler: 1250
n_false_pos_kepler: 1250

# K2 (k2pandc) targets — the whole labelled ecliptic-plane pool. Uncapped:
# build_label_catalog takes min(requested, available) ≈ 315 CP + 215 FP/REFUTED.
n_confirmed_k2: 1000000
n_false_pos_k2: 1000000

sectors: null
author: SPOC
cadence: 120

seed: ${seed}

split:
  train: 0.7
  val:   0.15
  test:  0.15
