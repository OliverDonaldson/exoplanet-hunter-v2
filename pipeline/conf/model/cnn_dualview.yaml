# Dual-view 1D CNN — Shallue & Vanderburg 2018 architecture.
# Builds via the Keras Functional API (matches DATA 305 Week 5 notes).
name: cnn_dualview
type: keras

use_aux_features: true     # depth, duration, log_period, SNR + stellar params.
use_batchnorm: true
spatial_dropout: 0.05
l2: 5.0e-5

global_view:
  conv_blocks: [16, 32, 64]            # Reduced from [16,32,64,128,256]
  conv_per_block: 2
  kernel_size: 5
  pool_size: 5                          # Larger pool → faster downsampling

local_view:
  conv_blocks: [16, 32]
  conv_per_block: 2
  kernel_size: 5
  pool_size: 3

head:
  fc_units: [256, 128]                  # More capacity than [128,64]
  dropout: 0.36                         # Optuna re-tune 2026-07, trial 26 (was 0.4)
  leaky_alpha: 0.1                      # LeakyReLU slope (Xie 2025 §2.2)

attention:                              # MHA on each tower (ExoNet §III.D)
  num_heads: 8
  key_dim: 32
  dropout: 0.1

se:                                     # SE channel attention (Hu 2018, Xie 2025)
  reduction: 8
  floor: 4                              # bottleneck floor; first block has C=16

output:
  activation: sigmoid
  units: 1

cross_validation:
  n_splits: 5
  shuffle: true
  random_state: ${seed}
  val_frac_within_fold: 0.12
