name: CI

on:
  push:
    branches: [v2, main]
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ./pipeline[dev]
      - name: Lint
        run: ruff check pipeline
      - name: Test
        run: pytest pipeline/tests -m "not network and not slow"

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ./pipeline -e ./api[dev]
      - name: Contract tests
        run: pytest api/tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build
        working-directory: frontend
        run: npm install && npm run build

  # feat/validation-gates adds two jobs here:
  #   catalogue-gate: Pandera checks on the refreshed catalogue
  #   promotion-gate: candidate model must beat current best CV score
