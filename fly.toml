# Fly.io config for the serving API. `fly launch` reads this; edit `app` to a
# unique name first. Secrets (AWS_* for the R2 dvc pull) are NOT here — set
# them with `fly secrets set`. See docs/DEPLOY.md.
app = "exoplanet-hunter-api"
primary_region = "syd"

[build]
  dockerfile = "docker/api.Dockerfile"

[env]
  FRONTEND_ORIGIN = "https://exoplanet-hunter-console.onrender.com"

[http_service]
  internal_port = 8000
  force_https = true
  # Suspend when idle: RAM is snapshotted, so the machine resumes in seconds
  # with the TF ensemble still loaded — scale-to-zero pricing without the
  # cold-start. flyd falls back to a full stop if a suspend isn't possible.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

# Cold start runs the entrypoint (dvc pull from R2, ~150 MB on a shared CPU)
# before /healthz answers; the grace period must cover it. The TF ensemble
# itself loads lazily on the first /score request, not at boot.
[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "180s"
  method = "GET"
  path = "/healthz"

# Headroom for the first-request TF import + 5-fold model load.
swap_size_mb = 512

[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb"
