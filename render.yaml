# Render Blueprint: currently deploys the vetting console only (free static
# site). Apply via Render dashboard: New → Blueprint → select this repo.
#
# The API stays local for now — a 5-fold TensorFlow ensemble needs a 2 GB
# instance (~$25/mo on Render; the 512 MB tiers OOM on model load), which
# we're deferring; Fly.io's sleep-when-idle machines are the cheaper option
# to revisit. Until an API is deployed the console renders the shell with an
# "API unreachable" banner — set VITE_API_BASE to the API's origin (and
# FRONTEND_ORIGIN on the API side for CORS) when that day comes. The full
# API service block is preserved below, commented, ready to re-enable.

services:
  - type: web
    name: exoplanet-hunter-console
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    # envVars:
    #   - key: VITE_API_BASE
    #     value: https://exoplanet-hunter-api.onrender.com

